<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Tools</title>
<link rel="stylesheet" href="text.css">
</head>
<body>

<div class="container">

  <h2>✍️ Text Tools</h2>

  <textarea id="textInput" placeholder="Enter your text here..." rows="6"></textarea>

  <div class="buttons">
    <button onclick="toUpperCase()">UPPERCASE</button>
    <button onclick="toLowerCase()">lowercase</button>
    <button onclick="countWords()">Word Count</button>
    <button onclick="removeSpaces()">Remove Extra Spaces</button>
    <button onclick="clearText()">Clear</button>
  </div>

  <div id="resultBox" class="result hidden">
    <h3>Result:</h3>
    <p id="resultText"></p>
  </div>

</div>

<script src="text.js"></script>
</body>
</html>
